services:
  api:
    build: .
    ports:
      - "80:8000"
    env_file:
      - .env.prod
    environment:
      - APP_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    volumes:
      - app_data:/app/data

volumes:
  app_data:
